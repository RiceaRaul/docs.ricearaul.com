{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ricearaul-com-ingressroute
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - kind: Rule
      match: {{ range $i, $host := .Values.ingressRoute.hosts }}{{ if $i }} || {{ end }}Host(`{{ $host }}`){{ end }}
      priority: {{ .Values.ingressRoute.priority }}
      services:
        - name: ricearaul-service
          port: {{ .Values.service.port }}
{{- end }}
